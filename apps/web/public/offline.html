<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#002045" />
    <title>Sin conexion | AppMiSalud Familia</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7fafc;
        color: #181c1e;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid #dfe3e8;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(26, 54, 93, 0.12);
        padding: 28px;
        text-align: center;
      }

      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: #002045;
        color: #d6e3ff;
        font-size: 34px;
        font-weight: 800;
      }

      h1 {
        margin: 0 0 8px;
        color: #002045;
        font-size: 24px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 20px;
        color: #43474e;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #13696a;
        color: #ffffff;
        font-weight: 700;
        padding: 0 20px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">+</div>
      <h1>Sin conexion</h1>
      <p>AppMiSalud no puede cargar esta seccion ahora. Revisa tu conexion e intenta nuevamente.</p>
      <a href="/">Volver al inicio</a>
    </main>
  </body>
</html>
